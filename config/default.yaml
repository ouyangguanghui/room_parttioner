# ---- 版本 ----
service_version: "4.0.2"          # 服务版本
model_version_tag: "0.0.1"       # 模型版本

# ---- 前处理 ----
target_size: [1024, 1024]
normalize: false              # YOLOv8 仅需 /255.0, 无需 ImageNet 标准化
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
viz_dir: "tests/output"  # 可视化结果保存目录 (相对路径，便于部署/测试)

# ---- Triton 推理 ----
triton_url: ""               # 留空则 fallback 到连通域方法，如 "192.168.2.55:8001"
model_name: "room_seg"
model_version: ""
triton_protocol: "grpc"      # grpc 或 http
input_name: "images"
output_name: "output0"
output_format: "yolo_obb"    # yolo_obb | xywha | xyxyxyxy
conf_threshold: 0.5
nms_threshold: 0.45

# ---- 后处理 ----
morph_kernel_size: 5          # 形态学核大小

# ---- 通用 ----
min_room_area: 1.0            # 最小房间面积 (m²)
wall_threshold: 128           # 墙壁像素阈值 (0-255)
resolution: 0.05              # 地图分辨率 (m/pixel)

# ---- 扩展分区 ----
door_width: 20                # 门口宽度阈值 (像素)
grow_iterations: 10           # 区域生长迭代次数
merge_area_threshold: 0       # 新区域面积低于此值时合并到相邻房间 (m²), 0 表示使用 min_room_area
merge_ratio_threshold: 0.6    # 接触边占新区域周长比例阈值, 超过则合并
min_new_region_area: 50       # 新区域最小面积 (像素), 低于此直接丢弃

# ---- 手动划分 ----
line_thickness: 3             # 分割线粗细 (像素)
