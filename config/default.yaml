# ---- 前处理 ----
target_size: [512, 512]
normalize: true
mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
viz_dir: "/home/ouyang/project/RoomPartitioner/tests/output"  # 可视化结果保存目录 debug

# ---- Triton 推理 ----
triton_url: ""               # 留空则 fallback 到连通域方法，如 "triton-server:8001"
model_name: "room_seg"
model_version: ""
triton_protocol: "grpc"      # grpc 或 http
input_name: "input"
output_name: "output"

# ---- 后处理 ----
morph_kernel_size: 5          # 形态学核大小

# ---- 通用 ----
min_room_area: 1.0            # 最小房间面积 (m²)
wall_threshold: 128           # 墙壁像素阈值 (0-255)
resolution: 0.05              # 地图分辨率 (m/pixel)

# ---- 扩展分区 ----
door_width: 20                # 门口宽度阈值 (像素)
grow_iterations: 10           # 区域生长迭代次数

# ---- 手动划分 ----
line_thickness: 3             # 分割线粗细 (像素)
